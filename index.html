<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #050505; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        
        /* Iframe 顯示容器 */
        #gallery-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85vw;
            height: 80vh;
            background: rgba(0, 0, 0, 0.95);
            border: 3px solid #00f2ff;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.5);
            display: none; /* 預設隱藏 */
            z-index: 100;
            border-radius: 10px;
        }

        #close-btn {
            position: absolute;
            top: -40px;
            right: 0;
            color: #00f2ff;
            cursor: pointer;
            background: none;
            border: 2px solid #00f2ff;
            padding: 5px 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        #close-btn:hover {
            background: #00f2ff;
            color: #000;
        }

        iframe { width: 100%; height: 100%; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="gallery-overlay">
        <button id="close-btn" onclick="closeGallery()">CLOSE [X]</button>
        <div id="iframe-container" style="width: 100%; height: 100%;"></div>
    </div>

    <script src="sketch.js"></script>
    <script>
        function closeGallery() {
            document.getElementById('gallery-overlay').style.display = 'none';
            document.getElementById('iframe-container').innerHTML = '';
        }
    </script>
</body>
</html>
